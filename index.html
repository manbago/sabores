<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de España: The Hoops Challenge</title>
    <!-- Phaser 3 Local -->
    <script src="lib/phaser.min.js"></script>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="game-container"></div>

    <!-- Popup de Notificación Toro -->
    <div id="notification-popup">
        <div id="notification-avatar">
            <img src="assets/bull_launcher.png" alt="Bull">
        </div>
        <div class="notification-content">
            <div class="notification-title" id="notification-title">Aviso</div>
            <div class="notification-msg" id="notification-msg">...</div>
        </div>
    </div>

    <div id="sabias-que-popup">
        <div id="sabias-que-close" onclick="closeSabiasQue()">X</div>
        <h2 id="sabias-que-title">💡 ¡Sabías que...!</h2>
        <div id="sabias-que-text">...</div>
    </div>

    <div id="game-stats">
        <div class="score-points">Reinos Conquistados: <span id="score-aciertos">0</span>/52</div>
        <div class="stat-box vidas-box" title="Vidas Restantes">
            <span id="ui-vidas">
                <span class="icon-active">🍽️</span><span class="icon-active">🍽️</span><span
                    class="icon-active">🍽️</span><span class="icon-active">🍽️</span><span
                    class="icon-active">🍽️</span><span class="icon-active">🍽️</span><span
                    class="icon-active">🍽️</span><span class="icon-active">🍽️</span>
            </span><br>
            <span style="font-size:14px; color:#333;">Vidas</span>
        </div>
        <div class="stat-box comodines-box" title="Usar Comodín (Pista)"
            onclick="event.stopPropagation(); usarComodin();">
            <span id="ui-comodines">
                <span class="icon-active">🃏</span><span class="icon-active">🃏</span><span
                    class="icon-active">🃏</span><span class="icon-active">🃏</span><span
                    class="icon-active">🃏</span><span class="icon-active">🃏</span><span
                    class="icon-active">🃏</span><span class="icon-active">🃏</span>
            </span><br>
            <span style="font-size:14px; color:#333;">Comodines</span>
        </div>
    </div>

    <button id="restart-btn" onclick="confirmRestart()">Terminar Partida</button>
    <button id="edit-btn" onclick="toggleEditMode()">Activar Modo Edición</button>

    <div id="hud-container">
        <div id="dashboard">
            <div class="food-preview">
                <div id="food-image"></div>
            </div>
            <div class="dashboard-info">
                <div class="dash-title">Preparando Lanzamiento...</div>
                <div class="dash-subtitle">¿DÓNDE ENCESTAMOS ESTE PLATO?</div>
                <div class="highlight-food" id="current-food">Cargando...</div>
                <div id="comodin-container" class="comodin-options" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div id="game-over-screen">
        <div id="game-over-box">
            <h1>¡Juego Terminado!</h1>
            <p class="final-score">Aciertos: <span id="final-aciertos">0</span>/52</p>
            <button onclick="location.reload()">Jugar de Nuevo</button>
        </div>
    </div>

    <div id="confirm-restart-screen">
        <div id="confirm-restart-box">
            <h1>¿Terminar Partida?</h1>
            <p class="final-score" style="font-size: 24px;">Se perderá tu progreso actual.</p>
            <div>
                <button class="btn-confirm" onclick="location.reload()">Sí, reiniciar</button>
                <button class="btn-cancel" onclick="cancelRestart(event)">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
